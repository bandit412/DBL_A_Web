{% extends "_layout.html" %}
{% block content %}
    <h1>Events Page</h1>
    {% for event in events %}
        <div class="row">
            <div class="col">
                {{ event.eventtitle }}
            </div>
            <div class="col">
                {{ event.event_location }}
            </div>
            <div class="col">
                {{ event.eventdate }}
            </div>
            <div class="col">
                {{ event.start_time }}
            </div>
            <div class="col">
                {{ event.end_time }}
            </div>
            <div class="col">
                {{ event.description }}
            </div>
        </div>
    {% endfor %}
{% endblock content %}
